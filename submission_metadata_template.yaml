# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
    Two-phase hybrid ranking pipeline processing 100,000 candidate profiles against a Senior AI Engineer JD. Phase 1 (offline, ~5 min on CPU) streams candidates, derives a temporal anchor, builds a vocabulary-pruned BM25 index (frequency ≥2), and generates 384-dim dense embeddings (all-MiniLM-L6-v2) against a HyDE-style ideal-resume anchor; BM25, dense, and career-keyword signals are fused via Reciprocal Rank Fusion (k=60).Phase 2 (online, ~1.2s) scores each candidate across 10 positive dimensions — skills, title, career semantic, production ownership, assessment, availability, location, education, experience, and engagement — with an optional cross-encoder rerank over the top 500 candidates. A 27-rule honeypot engine then applies multiplicative demotion: Shannon entropy <2.2 flags templated/synthetic text, company founding-year cross-references catch timeline paradoxes, and anachronistic-technology checks catch impossible experience claims;flagged profiles are demoted to a hard 0.0 score.Output is the top 100 candidates with deterministic multi-key tie-breaking, 6-decimal score precision, and reasoning text that is template-built and token-validated against each candidate's own profile to prevent hallucinated justifications.
