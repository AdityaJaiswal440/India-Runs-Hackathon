<svg viewBox="0 0 960 220" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12181F"/>
      <stop offset="100%" stop-color="#1B2733"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FDFBF6"/>
      <stop offset="100%" stop-color="#EFE3D6"/>
    </linearGradient>
  </defs>

  <rect width="960" height="220" rx="16" fill="url(#bg)"/>

  <!-- track line -->
  <line x1="40" y1="130" x2="920" y2="130" stroke="#2C3A47" stroke-width="2" stroke-dasharray="2 6"/>

  <!-- stage nodes -->
  <g font-size="11" fill="#9AA3AC" text-anchor="middle">
    <g>
      <rect x="30" y="100" width="90" height="60" rx="10" fill="#1B2430" stroke="#2C3A47"/>
      <text x="75" y="126" font-size="18">📄</text>
      <text x="75" y="150">resumes</text>
    </g>
    <g>
      <rect x="210" y="95" width="120" height="70" rx="10" fill="#173A31" stroke="#1F8A70"/>
      <text x="270" y="122" font-size="18">🔎</text>
      <text x="270" y="148" fill="#8FD9C4">BM25 + embed</text>
    </g>
    <g>
      <rect x="420" y="95" width="120" height="70" rx="10" fill="#3A2C16" stroke="#DE9B34"/>
      <text x="480" y="122" font-size="18">🛡</text>
      <text x="480" y="148" fill="#F2C878">honeypot</text>
    </g>
    <g>
      <rect x="630" y="95" width="120" height="70" rx="10" fill="#22203E" stroke="#6C63C9"/>
      <text x="690" y="122" font-size="18">⚖</text>
      <text x="690" y="148" fill="#B9B4EE">score + fuse</text>
    </g>
    <g>
      <rect x="840" y="100" width="90" height="60" rx="10" fill="#1B2430" stroke="#2C3A47"/>
      <text x="885" y="126" font-size="18">🏆</text>
      <text x="885" y="150">top 100</text>
    </g>
  </g>

  <!-- moving candidate cards -->
  <g>
    <rect x="0" y="0" width="34" height="22" rx="4" fill="url(#cardGrad)">
      <animateMotion dur="7s" repeatCount="indefinite" begin="0s"
        path="M40,130 C 200,130 260,80 320,80 S 500,180 560,130 S 800,80 920,130" />
    </rect>
    <rect x="0" y="0" width="34" height="22" rx="4" fill="url(#cardGrad)">
      <animateMotion dur="7s" repeatCount="indefinite" begin="-1.4s"
        path="M40,130 C 200,130 260,80 320,80 S 500,180 560,130 S 800,80 920,130" />
    </rect>
    <rect x="0" y="0" width="34" height="22" rx="4" fill="url(#cardGrad)">
      <animateMotion dur="7s" repeatCount="indefinite" begin="-2.8s"
        path="M40,130 C 200,130 260,80 320,80 S 500,180 560,130 S 800,80 920,130" />
    </rect>
    <rect x="0" y="0" width="34" height="22" rx="4" fill="url(#cardGrad)">
      <animateMotion dur="7s" repeatCount="indefinite" begin="-4.2s"
        path="M40,130 C 200,130 260,80 320,80 S 500,180 560,130 S 800,80 920,130" />
    </rect>
    <rect x="0" y="0" width="34" height="22" rx="4" fill="url(#cardGrad)">
      <animateMotion dur="7s" repeatCount="indefinite" begin="-5.6s"
        path="M40,130 C 200,130 260,80 320,80 S 500,180 560,130 S 800,80 920,130" />
    </rect>
  </g>

  <text x="480" y="35" text-anchor="middle" fill="#EDEAE2" font-size="20" font-weight="700">Redrob Intelligent Candidate Ranker</text>
  <text x="480" y="58" text-anchor="middle" fill="#9AA3AC" font-size="12.5">100,000 candidates → offline hybrid scoring → 100 ranked, grounded justifications</text>

  <text x="75" y="192" text-anchor="middle" fill="#5B6169" font-size="9">candidates.jsonl</text>
  <text x="885" y="192" text-anchor="middle" fill="#5B6169" font-size="9">era.csv</text>
</svg>
