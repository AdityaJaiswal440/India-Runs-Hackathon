<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F8A70"/>
      <stop offset="100%" stop-color="#6C63C9"/>
    </linearGradient>
  </defs>
  <rect width="720" height="340" rx="14" fill="#F3EFE6"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1C2127">Final Score Weight Breakdown</text>

  <!-- rows: label, weight percent, y position -->
  <!-- Title Alignment 20 -->
  <g>
    <text x="24" y="58" font-size="12" fill="#1C2127">Title Alignment</text>
    <rect x="220" y="47" width="0" height="12" rx="6" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="400" dur="1.4s" fill="freeze" begin="0.1s"/>
    </rect>
    <text x="630" y="58" font-size="11" fill="#5B6169">20%</text>
  </g>
  <!-- Skill Match 18 -->
  <g>
    <text x="24" y="86" font-size="12" fill="#1C2127">Skill Match</text>
    <rect x="220" y="75" width="0" height="12" rx="6" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="360" dur="1.4s" fill="freeze" begin="0.2s"/>
    </rect>
    <text x="630" y="86" font-size="11" fill="#5B6169">18%</text>
  </g>
  <!-- Career Semantic 14 -->
  <g>
    <text x="24" y="114" font-size="12" fill="#1C2127">Career Semantic</text>
    <rect x="220" y="103" width="0" height="12" rx="6" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="280" dur="1.4s" fill="freeze" begin="0.3s"/>
    </rect>
    <text x="630" y="114" font-size="11" fill="#5B6169">14%</text>
  </g>
  <!-- Production Fit 12 -->
  <g>
    <text x="24" y="142" font-size="12" fill="#1C2127">Production Fit</text>
    <rect x="220" y="131" width="0" height="12" rx="6" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="240" dur="1.4s" fill="freeze" begin="0.4s"/>
    </rect>
    <text x="630" y="142" font-size="11" fill="#5B6169">12%</text>
  </g>
  <!-- Availability 12 -->
  <g>
    <text x="24" y="170" font-size="12" fill="#1C2127">Availability</text>
    <rect x="220" y="159" width="0" height="12" rx="6" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="240" dur="1.4s" fill="freeze" begin="0.5s"/>
    </rect>
    <text x="630" y="170" font-size="11" fill="#5B6169">12%</text>
  </g>
  <!-- Verified Test 8 -->
  <g>
    <text x="24" y="198" font-size="12" fill="#1C2127">Verified Test</text>
    <rect x="220" y="187" width="0" height="12" rx="6" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="160" dur="1.4s" fill="freeze" begin="0.6s"/>
    </rect>
    <text x="630" y="198" font-size="11" fill="#5B6169">8%</text>
  </g>
  <!-- JD Overlap 6 -->
  <g>
    <text x="24" y="226" font-size="12" fill="#1C2127">JD Overlap</text>
    <rect x="220" y="215" width="0" height="12" rx="6" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="120" dur="1.4s" fill="freeze" begin="0.7s"/>
    </rect>
    <text x="630" y="226" font-size="11" fill="#5B6169">6%</text>
  </g>
  <!-- Engagement 5 -->
  <g>
    <text x="24" y="254" font-size="12" fill="#1C2127">Engagement</text>
    <rect x="220" y="243" width="0" height="12" rx="6" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="100" dur="1.4s" fill="freeze" begin="0.8s"/>
    </rect>
    <text x="630" y="254" font-size="11" fill="#5B6169">5%</text>
  </g>
  <!-- Experience Fit 5 -->
  <g>
    <text x="24" y="282" font-size="12" fill="#1C2127">Experience Fit</text>
    <rect x="220" y="271" width="0" height="12" rx="6" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="100" dur="1.4s" fill="freeze" begin="0.9s"/>
    </rect>
    <text x="630" y="282" font-size="11" fill="#5B6169">5%</text>
  </g>
  <!-- Location 3 -->
  <g>
    <text x="24" y="310" font-size="12" fill="#1C2127">Location</text>
    <rect x="220" y="299" width="0" height="12" rx="6" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="60" dur="1.4s" fill="freeze" begin="1.0s"/>
    </rect>
    <text x="630" y="310" font-size="11" fill="#5B6169">3%</text>
  </g>
</svg>
